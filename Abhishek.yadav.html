<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Hand Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #ui { position: absolute; top: 10%; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
        }
        button { 
            padding: 15px 30px; font-size: 1.2rem; border-radius: 30px; border: none; 
            background: #007AFF; color: white; cursor: pointer; font-weight: bold;
        }
        video { display: none; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>Particle Alchemist</h1>
    <p>Grant camera access to play</p>
    <button id="startButton">START CAMERA</button>
</div>

<div id="ui">
    <h2 id="gesture-name">Ready?</h2>
    <div style="font-size: 0.8rem; opacity: 0.6;">Pinch = Heart | Open = Explode</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/** 1. SETUP THREE.JS (Optimized for Mobile) **/
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
renderer.setPixelRatio(window.devicePixelRatio > 2 ? 2 : window.devicePixelRatio); // Cap pixel ratio for performance
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 8;

// Reduce count to 5000 for mobile battery/performance
const PARTICLE_COUNT = 5000;
const posArray = new Float32Array(PARTICLE_COUNT * 3);
const targetArray = new Float32Array(PARTICLE_COUNT * 3);
const colorArray = new Float32Array(PARTICLE_COUNT * 3);

for(let i = 0; i < PARTICLE_COUNT * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 10;
    targetArray[i] = posArray[i];
    colorArray[i] = Math.random();
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

const material = new THREE.PointsMaterial({
    size: 0.08, // Slightly larger particles for smaller screens
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

/** 2. TEMPLATE LOGIC **/
function setTemplate(type, scale = 1) {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        if (type === 'heart') {
            const t = Math.random() * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const s = 0.15 * scale;
            targetArray[i3] = x * s; targetArray[i3+1] = y * s; targetArray[i3+2] = (Math.random()-0.5)*2;
        } else {
            const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
            const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
            targetArray[i3] = Math.cos(theta) * Math.sin(phi) * scale;
            targetArray[i3+1] = Math.sin(theta) * Math.sin(phi) * scale;
            targetArray[i3+2] = Math.cos(phi) * scale;
        }
    }
}

/** 3. HAND TRACKING & MOBILE CAMERA **/
const videoElement = document.createElement('video');
videoElement.setAttribute('playsinline', ''); // Critical for iOS

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });

hands.onResults((results) => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const index = landmarks[8];
        const thumb = landmarks[4];
        
        // Map landmarks (Invert X for selfie-view)
        const tx = (index.x - 0.5) * -12;
        const ty = (index.y - 0.5) * -12;
        particles.position.lerp(new THREE.Vector3(tx, ty, 0), 0.15);

        const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
        if (dist < 0.06) {
            document.getElementById('gesture-name').innerText = "💖 HEART";
            setTemplate('heart', 2);
        } else if (dist > 0.35) {
            document.getElementById('gesture-name').innerText = "💥 EXPLODE";
            setTemplate('sphere', 6);
        } else {
            document.getElementById('gesture-name').innerText = "✨ ORB";
            setTemplate('sphere', dist * 15);
        }
    }
});

// User Gesture Trigger
document.getElementById('startButton').addEventListener('click', () => {
    document.getElementById('overlay').style.display = 'none';
    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 480, height: 480,
        facingMode: "user" // Force Front Camera
    });
    cameraUtils.start();
});

/** 4. ANIMATION **/
function animate() {
    requestAnimationFrame(animate);
    const pos = geometry.attributes.position.array;
    for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        pos[i] += (targetArray[i] - pos[i]) * 0.1;
    }
    geometry.attributes.position.needsUpdate = true;
    particles.rotation.y += 0.005;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
